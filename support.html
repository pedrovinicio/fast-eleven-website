<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Fast Eleven</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Fast Eleven</a>
            <div class="nav-links">
                <a href="privacy.html" data-i18n="nav.privacy">Privacy</a>
                <a href="support.html" class="active" data-i18n="nav.support">Support</a>
                <div class="lang-switcher">
                    <button data-lang="en" class="active" onclick="setLanguage('en')">EN</button>
                    <span class="lang-separator">|</span>
                    <button data-lang="pt" onclick="setLanguage('pt')">PT</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="page-content">
        <div class="container">
            <h2 data-i18n="support.title">Support</h2>
            <p data-i18n="support.intro">If you encounter any issues or have feedback, please reach out:</p>
            <p><span data-i18n="support.email.label">Email:</span> <a href="mailto:pedrovinicio@gmail.com">pedrovinicio@gmail.com</a></p>
            <p><span data-i18n="support.github.label">GitHub:</span> <a href="https://github.com/pedrovinicio/fast-eleven/issues" target="_blank" data-i18n="support.github.link">Report an issue</a></p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p data-i18n-html="footer.rights">&copy; 2026 Pedro Vinicio. All rights reserved.</p>
    </footer>

    <script src="i18n.js"></script>
</body>
</html>
