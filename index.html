<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Eleven - Football Manager</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Fast Eleven</a>
            <div class="nav-links">
                <a href="privacy.html" data-i18n="nav.privacy">Privacy</a>
                <a href="support.html" data-i18n="nav.support">Support</a>
                <div class="lang-switcher">
                    <button data-lang="en" class="active" onclick="setLanguage('en')">EN</button>
                    <span class="lang-separator">|</span>
                    <button data-lang="pt" onclick="setLanguage('pt')">PT</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Fast Eleven</h1>
                <p class="tagline" data-i18n="hero.tagline">A minimalist football management game for quick sessions.
                </p>
                <div class="store-buttons">
                    <a href="https://apps.apple.com/br/app/fast-eleven/id6760587437" class="store-button"
                        id="app-store-btn" target="_blank" rel="noopener">
                        <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83"
                            alt="Download on the App Store">
                    </a>
                    <a href="https://play.google.com/store/apps/details?id=com.fasteleven"
                        class="store-button play-store" id="play-store-btn" target="_blank" rel="noopener">
                        <img src="google-play-badge.png" alt="Get it on Google Play">
                    </a>
                </div>
            </div>
            <div class="phone-wrapper">
                <div class="phone-mockup">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <img src="screenshot.png" alt="Fast Eleven">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <p data-i18n-html="footer.rights">&copy; 2026 Fast Eleven. All rights reserved.</p>
    </footer>

    <script src="i18n.js"></script>
</body>

</html>
